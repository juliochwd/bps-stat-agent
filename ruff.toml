# Ruff linter & formatter configuration
# https://docs.astral.sh/ruff/configuration/

target-version = "py311"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",
    "W293",
    "B008",
    "B904",
    "B905",
    "E722",
    "SIM102",
    "SIM103",
    "SIM105",
    "SIM108",
    "SIM112",
    "SIM117",
    "SIM118",
    "SIM201",
    "UP007",
    "UP042",
]

[lint.per-file-ignores]
"tests/**/*.py" = ["B011", "F841", "B023", "SIM300"]
"mini_agent/cli.py" = ["B023"]
"mini_agent/bps_mcp_server.py" = ["F821"]
"mini_agent/skills/**/*.py" = ["F841", "B007"]

[lint.isort]
known-first-party = ["mini_agent"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
