# BPS Stat Agent Configuration Example
# 
# Configuration File Locations (in priority order):
# 1) mini_agent/config/config.yaml - Development mode (current directory)
# 2) ~/.bps-stat-agent/config/config.yaml - User config directory
# 3) <package>/mini_agent/config/config.yaml - Package installation directory
#
# To use this config:
# - Copy this file to one of the above locations as config.yaml
# - Fill in your API key and customize settings as needed
# - All config files (config.yaml, mcp.json, system_prompt.md) are in the same directory

# ===== LLM Configuration =====
# API Configuration
# Supports multiple providers: Anthropic, OpenAI, MiniMax, SiliconFlow, etc.
# - Anthropic: https://api.anthropic.com -> api_base: https://api.anthropic.com
# - OpenAI: https://api.openai.com -> api_base: https://api.openai.com
# - MiniMax Global: https://api.minimax.io -> api_base: https://api.minimax.io
# - MiniMax China: https://api.minimaxi.com -> api_base: https://api.minimaxi.com
# Please choose based on your network environment and get API key from corresponding platform
api_key: "YOUR_API_KEY_HERE"  # Replace with your API Key (run: bpsagent setup)
api_base: "https://platform.minimax.io"  # Default (MiniMax)
# api_base: "https://api.anthropic.com"  # Anthropic
# api_base: "https://api.openai.com"  # OpenAI
# api_base: "https://api.minimax.io"  # MiniMax Global
# api_base: "https://api.minimaxi.com"  # MiniMax China
model: "MiniMax-M2.5"
# LLM provider: "anthropic" or "openai"
# MiniMax uses OpenAI-compatible API, so use "openai" for MiniMax.
provider: "openai"  # Default: openai (for MiniMax)

# ===== Retry Configuration =====
retry:
  enabled: true           # Enable retry mechanism
  max_retries: 3          # Maximum number of retries
  initial_delay: 1.0      # Initial delay time (seconds)
  max_delay: 60.0         # Maximum delay time (seconds)
  exponential_base: 2.0   # Exponential backoff base (delay = initial_delay * base^attempt)

# ===== Agent Configuration =====
max_steps: 100  # Maximum execution steps (code default: 50)
workspace_dir: "./workspace"  # Working directory
system_prompt_path: "system_prompt.md"  # System prompt file (same config directory)

# ===== BPS Configuration =====
bps:
  # Default domain for BPS searches
  # 5300 = Nusa Tenggara Timur (NTT)
  # 0000 = Nasional (National)
  # Other provinces: 1100=Aceh, 1200=Sumatera Utara, etc.
  default_domain: "5300"
  
  # Delay between searches (seconds) to avoid Cloudflare rate-limiting
  search_delay: 10
  
  # Maximum results per search
  max_results: 10
  
  # Playwright settings
  playwright:
    headless: true
    timeout: 30

# ===== Tools Configuration =====
tools:
  # Basic tool switches
  enable_file_tools: true  # File read/write/edit tools (ReadTool, WriteTool, EditTool)
  enable_bash: true        # Bash command execution tool
  enable_note: true        # Session note tool (SessionNoteTool)
  
  # Claude Skills
  enable_skills: true      # Enable Skills
  skills_dir: "./skills"   # Skills directory path
  
  # MCP Tools
  enable_mcp: true         # Enable MCP tools
  mcp_config_path: "mcp.json"  # MCP configuration file (same config directory)
                           # Note: API Keys for MCP tools are configured in mcp.json
  # MCP timeout configuration (prevents hanging on network issues)
  mcp:
    connect_timeout: 15.0    # Connection timeout in seconds (default: 15)
    execute_timeout: 120.0    # Tool execution timeout in seconds (default: 120)
    sse_read_timeout: 120.0  # SSE read timeout in seconds (default: 120)

# ===== Logging Configuration =====
logging:
  level: "INFO"           # Log level: DEBUG, INFO, WARNING, ERROR
  json_output: false      # true for production (JSON to stdout), false for development
  #   log_file: null        # Optional: path to additional log file

# ===== Tracing Configuration (requires: pip install bps-stat-agent[tracing]) =====
tracing:
  enabled: false          # Enable OpenTelemetry tracing
  exporter: "none"        # "none", "console", or "otlp"
  # otlp_endpoint: "http://localhost:4317"  # OTLP gRPC endpoint (e.g., Jaeger)
